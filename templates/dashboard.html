<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: 'Segoe UI';
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            width: 150px;
        }

        table {
            margin: auto;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border: 1px solid #334155;
        }

        .fraud { background: red; }
        .suspicious { background: orange; }
    </style>
</head>

<body>

<h1>📊 Live Fraud Dashboard</h1>

<div class="stats">
    <div class="card">Total<br>{{ total }}</div>
    <div class="card">Fraud<br>{{ fraud }}</div>
    <div class="card">Suspicious<br>{{ suspicious }}</div>
    <div class="card">Safe<br>{{ safe }}</div>
</div>

<canvas id="chart" width="200" height="200"></canvas>

<script>
new Chart(document.getElementById('chart'), {
    type: 'doughnut',
    data: {
        labels: ['Fraud', 'Suspicious', 'Safe'],
        datasets: [{
            data: [{{ fraud }}, {{ suspicious }}, {{ safe }}]
        }]
    }
});
</script>

<table>
<tr>
    <th>Amount</th>
    <th>Status</th>
    <th>Confidence</th>
</tr>

{% for row in data %}
<tr class="
    {% if 'High Risk' in row[1] %}fraud
    {% elif 'Suspicious' in row[1] %}suspicious
    {% endif %}
">
    <td>{{ row[0] }}</td>
    <td>{{ row[1] }}</td>
    <td>{{ row[2] }}%</td>
</tr>
{% endfor %}
</table>

<script>
setInterval(() => {
    location.reload();
}, 5000);
</script>

</body>
</html>
