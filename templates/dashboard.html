<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: #020617;
            color: white;
            font-family: 'Segoe UI';
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px;
        }

        .card {
            background: #0f172a;
            padding: 20px;
            border-radius: 15px;
            width: 160px;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        table {
            margin: auto;
            margin-top: 30px;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            border: 1px solid #334155;
        }

        .fraud {
            background: red;
            color: white;
        }

        .suspicious {
            background: orange;
        }
    </style>
</head>

<body>

<h1>📊 Live Fraud Dashboard</h1>

<div class="stats">
    <div class="card">Total<br>{{ total }}</div>
    <div class="card">Fraud<br>{{ fraud }}</div>
    <div class="card">Suspicious<br>{{ suspicious }}</div>
    <div class="card">Safe<br>{{ safe }}</div>
</div>

<canvas id="chart" width="200" height="200"></canvas>

<script>
new Chart(document.getElementById('chart'), {
    type: 'doughnut',
    data: {
        labels: ['Fraud', 'Suspicious', 'Safe'],
        datasets: [{
            data: [{{ fraud }}, {{ suspicious }}, {{ safe }}]
        }]
    }
});
</script>

<table>
<tr>
    <th>Amount</th>
    <th>Status</th>
    <th>Confidence</th>
</tr>

{% for row in data %}
<tr class="
    {% if 'High Risk' in row[1] %}fraud
    {% elif 'Suspicious' in row[1] %}suspicious
    {% endif %}
">
    <td>{{ row[0] }}</td>
    <td>{{ row[1] }}</td>
    <td>{{ row[2] }}%</td>
</tr>
{% endfor %}
</table>

<script>
setInterval(() => {
    location.reload();
}, 5000);
</script>

</body>
</html>
