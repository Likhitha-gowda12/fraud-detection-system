<!DOCTYPE html>
<html>
<head>
    <title>AI Fraud Detection</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 100px;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 30px;
        }

        input {
            padding: 12px;
            width: 250px;
            border-radius: 10px;
            border: none;
            margin-right: 10px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            background: #22c55e;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }

        .result {
            margin-top: 40px;
            font-size: 28px;
        }

        .safe { color: #22c55e; }
        .suspicious { color: orange; }
        .fraud { color: red; }

        a {
            display: block;
            margin-top: 30px;
            color: #38bdf8;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🚨 AI Fraud Detection System</h1>

    <form action="/predict" method="post">
        <input type="number" name="amount" placeholder="Enter Transaction Amount" required>
        <button type="submit">Analyze Transaction</button>
    </form>

    {% if prediction %}
    <div class="result">

        <h2 class="
            {% if 'High' in prediction %}fraud
            {% elif 'Suspicious' in prediction %}suspicious
            {% else %}safe
            {% endif %}
        ">
            Status: {{ prediction }}
        </h2>

        <h3>Risk Score: {{ confidence }}%</h3>

    </div>
    {% endif %}

    <a href="/dashboard">View Analytics Dashboard →</a>

</div>

</body>
</html>
