<!DOCTYPE html>
<html>
<head>
    <title>UPI Payment</title>

    <style>
        body {
            background: #020617;
            color: white;
            font-family: 'Segoe UI';
            text-align: center;
        }

        .card {
            margin-top: 120px;
            background: #0f172a;
            padding: 30px;
            border-radius: 15px;
            width: 300px;
            margin-left: auto;
            margin-right: auto;
        }

        input {
            padding: 12px;
            width: 90%;
            margin: 10px;
            border-radius: 10px;
            border: none;
        }

        button {
            padding: 12px;
            width: 95%;
            border-radius: 10px;
            background: #22c55e;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }
    </style>
</head>

<body>

<div class="card">

<h2>💳 UPI Payment</h2>

<form action="/predict" method="post">
    <input type="text" name="name" placeholder="Receiver Name" required>
    <input type="number" name="amount" placeholder="Enter Amount" required>
    <button type="submit">Pay Now</button>
</form>

</div>

</body>
</html>
